<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グルメノート</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:    #1b3a6b;
  --navy-dk: #0f2547;
  --navy-lt: #2d5ca8;
  --blue-tint:#e8f0fc;
  --blue-pale:#f4f8ff;
  --bg:      #f2f5fb;
  --surface: #ffffff;
  --border:  #d4dff0;
  --shadow:  rgba(15,37,71,.1);
  --text:    #0d1f3c;
  --text-sub:#4a5c78;
  --text-lt: #8fa3c0;
  --success: #0d6b43;
  --warn:    #9a5800;
  --danger:  #b52828;
  --hdr:     56px;
  --tab:     42px;
  --r:8px;--r-lg:14px;--r-sm:5px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;height:var(--hdr);background:linear-gradient(135deg,var(--navy-dk) 0%,var(--navy) 100%);display:flex;align-items:center;padding:0 14px;gap:8px;box-shadow:0 2px 12px rgba(15,37,71,.25)}
.hdr-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px;flex:1;display:flex;align-items:center;gap:8px}
.hdr-title small{font-size:11px;font-weight:400;opacity:.6;letter-spacing:.3px}
.save-status{font-size:11px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:4px;white-space:nowrap}
.save-status.ok{color:#6ee7b7}.save-status.pending{color:#fcd34d}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s,transform .1s;line-height:1;white-space:nowrap;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn-white{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-white:hover{background:rgba(255,255,255,.25)}
.btn-accent{background:#fff;color:var(--navy)}
.btn-accent:hover{background:#e8f0fc}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-dk)}
.btn-ghost{background:transparent;color:var(--text-sub);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--navy-lt);color:var(--navy-lt)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#8b1f1f}
.btn-icon{padding:7px;border-radius:var(--r-sm)}
.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* TAB BAR */
.tab-bar{position:sticky;top:var(--hdr);z-index:95;height:var(--tab);background:var(--navy-dk);display:flex;border-bottom:1px solid rgba(255,255,255,.1)}
.tab-btn{flex:1;max-width:140px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border:none;background:transparent;transition:color .15s;border-bottom:2px solid transparent;font-family:var(--font)}
.tab-btn.active{color:#fff;border-bottom-color:#60a5fa}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.8)}

/* DATA MENU */
.data-menu{position:fixed;top:calc(var(--hdr) + 4px);right:10px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 24px var(--shadow);padding:5px 0;min-width:175px}
.menu-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:9px 15px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text);font-family:var(--font);transition:background .1s}
.menu-item:hover{background:var(--bg)}
.menu-item.red{color:var(--danger)}
.menu-sep{margin:4px 0;border:none;border-top:1px solid var(--border)}
.hidden{display:none!important}

/* FILTER BAR */
.filter-bar{position:sticky;top:calc(var(--hdr) + var(--tab));z-index:90;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 4px rgba(15,37,71,.06)}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fsearch{flex:1;min-width:180px;position:relative}
.fsearch input{width:100%;padding:8px 10px 8px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;font-family:var(--font)}
.fsearch input:focus{border-color:var(--navy-lt);background:#fff}
.fsearch .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-lt);pointer-events:none}
.fsel{padding:7px 9px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);outline:none;cursor:pointer;font-family:var(--font);transition:border-color .15s}
.fsel:focus{border-color:var(--navy-lt)}
.scene-pill{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text-sub);transition:all .15s;user-select:none;white-space:nowrap}
.scene-pill:hover{border-color:var(--navy-lt);color:var(--navy-lt)}
.scene-pill.on{background:var(--navy);border-color:var(--navy);color:#fff}
.vtog{display:flex;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--bg)}
.vtog button{padding:6px 11px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-sub);transition:all .15s;font-family:var(--font)}
.vtog button:not(:last-child){border-right:1px solid var(--border)}
.vtog button.on{background:var(--navy);color:#fff}
.clear-btn{font-size:12px;color:var(--text-lt);cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:var(--r-sm);font-family:var(--font)}
.clear-btn:hover{color:var(--danger)}

/* STATS */
.stats{padding:6px 14px;font-size:12px;color:var(--text-lt)}

/* CARD GRID */
.card-grid{padding:8px 14px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px}
.rcard{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 1px 3px var(--shadow);cursor:pointer;transition:box-shadow .2s,transform .15s;overflow:hidden}
.rcard:hover{box-shadow:0 4px 12px rgba(15,37,71,.12);transform:translateY(-1px)}
.card-body{padding:13px 14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;flex:1}
.gbadge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--blue-tint);color:var(--navy-lt);white-space:nowrap;flex-shrink:0}
.card-meta{font-size:12px;color:var(--text-sub);margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stars{color:#f59e0b;letter-spacing:.5px;font-size:12px}
.card-scenes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tag-接待{background:#dbeafe;color:#1e40af}
.tag-飲み会{background:#ede9fe;color:#5b21b6}
.tag-ランチ{background:#fed7aa;color:#92400e}
.tag-個室{background:#d1fae5;color:#065f46}
.tag-大人数OK{background:#dcfce7;color:#14532d}
.tag-女子会{background:#fce7f3;color:#831843}
.tag-デート{background:#ffe4e6;color:#9f1239}
.tag-カジュアル{background:#f1f5f9;color:#334155}
.card-budget{font-size:12px;color:var(--text-sub);margin-bottom:7px}
.card-budget b{color:var(--text)}
.card-vis-row{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.vbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-weight:600;font-size:11px}
.vbadge.yes{background:#d1fae5;color:#065f46}
.vbadge.no{background:#fef3c7;color:#78350f}
.card-ref{color:var(--text-lt);font-size:11px}
.card-foot{border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:5px;background:#fafbfd;flex-wrap:wrap;align-items:center}
.clink{display:inline-flex;align-items:center;gap:3px;padding:5px 9px;border-radius:var(--r-sm);font-size:12px;font-weight:500;text-decoration:none;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;font-family:var(--font);line-height:1.2}
.clink:hover{background:var(--bg);border-color:var(--navy-lt);color:var(--navy-lt)}
.clink.tbl{border-color:#e0860a;color:#b56500}
.clink.tbl:hover{background:#fff8ed}
.clink.map{border-color:#0a8a52;color:#0a7044}
.clink.map:hover{background:#f0fdf6}
.cedit{margin-left:auto;display:inline-flex;align-items:center;gap:3px;padding:5px 9px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-sub);transition:all .15s;font-family:var(--font)}
.cedit:hover{border-color:var(--navy-lt);color:var(--navy-lt)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-lt)}
.empty-state svg{width:52px;height:52px;opacity:.35;margin-bottom:14px}
.empty-state h3{font-size:17px;margin-bottom:6px;color:var(--text-sub)}

/* MAP VIEW */
.map-view{display:none}
.map-view.active{display:flex;flex-direction:column}
#map-container{flex:1;width:100%;min-height:400px;height:calc(100vh - var(--hdr) - var(--tab) - 120px - 40px)}
.list-view{display:block}
.list-view.hidden-view{display:none}

/* MAP TOOLBAR */
.map-toolbar{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;overflow-x:auto;flex-shrink:0}
.legend-item{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--text-sub);white-space:nowrap;cursor:pointer}
.legend-dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0;border:1.5px solid rgba(0,0,0,.12)}
.map-toolbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.btn-map-color{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--text-sub);background:#fff;cursor:pointer;font-family:var(--font);margin-left:auto;flex-shrink:0;white-space:nowrap;transition:all .15s}
.btn-map-color:hover{border-color:var(--navy-lt);color:var(--navy-lt)}

/* COLOR SETTINGS MODAL */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.color-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg)}
.color-swatch{width:20px;height:20px;border-radius:50%;border:2px solid rgba(0,0,0,.1);flex-shrink:0;cursor:pointer;position:relative;overflow:hidden}
.color-swatch input[type=color]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);opacity:0;cursor:pointer;border:none;padding:0}
.color-genre-name{font-size:12px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.color-hex{font-size:11px;color:var(--text-lt);font-family:monospace}

/* CUSTOM PIN */
.map-pin-wrap{filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:1000;background:rgba(10,25,56,.5);display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.hidden{display:none}
.mbox{background:var(--surface);border-radius:var(--r-lg);width:100%;max-width:600px;box-shadow:0 20px 40px rgba(10,25,56,.2);margin:auto}
.mhdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.mtitle{font-size:15px;font-weight:700;color:var(--text)}
.mclose{background:none;border:none;cursor:pointer;color:var(--text-lt);padding:4px;border-radius:4px;display:flex;line-height:1;font-family:var(--font)}
.mclose:hover{color:var(--text);background:var(--bg)}
.mbody{padding:18px;overflow-y:auto;max-height:calc(100vh - 180px)}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;align-items:center}

/* FORM */
.fsec{margin-bottom:18px}
.fsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-lt);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.frow{display:flex;gap:10px;margin-bottom:10px}
.fg{flex:1;display:flex;flex-direction:column;gap:4px}
.flabel{font-size:12px;font-weight:600;color:var(--text)}
.flabel .req{color:var(--danger);margin-left:2px}
.finput{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:var(--font);width:100%}
.finput:focus{border-color:var(--navy-lt)}
.ftarea{resize:vertical;min-height:72px}
.fhint{font-size:11px;color:var(--text-lt)}
.scene-cbs{display:flex;flex-wrap:wrap;gap:5px}
.scb{display:none}
.scb-lbl{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text-sub);transition:all .15s;user-select:none}
.scb:checked+.scb-lbl{background:var(--navy);border-color:var(--navy);color:#fff}
.star-rating{display:flex;gap:3px;flex-direction:row-reverse;justify-content:flex-end}
.star-rating input{display:none}
.star-rating label{font-size:26px;color:#d1d5db;cursor:pointer;transition:color .1s;line-height:1}
.star-rating label:hover,.star-rating label:hover~label,.star-rating input:checked~label{color:#f59e0b}
.cb-group{display:flex;gap:14px;flex-wrap:wrap}
.cbi{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.cbi input{cursor:pointer;accent-color:var(--navy)}

/* VISITS */
.visit-entry{border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;background:var(--blue-pale)}
.ve-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ve-num{font-size:12px;font-weight:700;color:var(--navy-lt)}
.btn-rm-v{font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px;font-family:var(--font)}
.btn-rm-v:hover{background:#fee2e2}
.btn-add-v{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px dashed var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--text-sub);background:transparent;cursor:pointer;width:100%;justify-content:center;transition:all .15s;font-family:var(--font);margin-top:4px}
.btn-add-v:hover{border-color:var(--navy-lt);color:var(--navy-lt);background:var(--blue-pale)}

/* DETAIL */
.det-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dlink{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;text-decoration:none;border:1.5px solid;transition:all .15s}
.dlink.tbl{background:#fff8ed;color:#b56500;border-color:#fcd34d}
.dlink.tbl:hover{background:#fff3d4}
.dlink.gmap{background:#f0fdf6;color:#0a7044;border-color:#a7f3d0}
.dlink.gmap:hover{background:#dcfce7}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.db .db-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-lt);margin-bottom:3px}
.db .db-val{font-size:13px;color:var(--text)}
.big-stars{font-size:20px;color:#f59e0b}
.det-notes{margin-top:12px;padding:11px 13px;background:var(--bg);border-radius:var(--r-sm);font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text)}
.det-meta{margin-top:12px;font-size:11px;color:var(--text-lt)}
.visits-timeline{margin-top:14px}
.vt-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-lt);margin-bottom:10px}
.vt-entry{border-left:3px solid var(--navy-lt);padding:8px 0 8px 12px;margin-bottom:10px}
.vt-date{font-size:13px;font-weight:700;color:var(--navy)}
.vt-meta{font-size:12px;color:var(--text-sub);margin-top:2px}
.vt-note{font-size:12px;color:var(--text);margin-top:4px;font-style:italic}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none;align-items:center}
.toast{background:#1a2844;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(10,25,56,.25);animation:tin .25s ease;white-space:nowrap}
.toast.ok{background:var(--success)}
.toast.err{background:var(--danger)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* MAP POPUP */
.leaflet-popup-content-wrapper{border-radius:var(--r);box-shadow:0 4px 16px var(--shadow)}
.map-popup{min-width:160px}.map-popup .pname{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.map-popup .pmeta{font-size:12px;color:var(--text-sub);margin-bottom:4px}
.map-popup .pbtn{display:inline-block;margin-top:6px;padding:4px 10px;background:var(--navy);color:#fff;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}

/* GEOCODE STATUS */
.geo-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.geo-badge.ok{background:#d1fae5;color:#065f46}
.geo-badge.no{background:#fef3c7;color:#78350f}
.geo-badge.loading{background:#e0e7ff;color:#3730a3}

@media(max-width:640px){
  .card-grid{grid-template-columns:1fr;padding:8px 10px 80px}
  .filter-bar{padding:8px 10px}
  .overlay{padding:0;align-items:flex-end}
  .mbox{border-radius:var(--r-lg) var(--r-lg) 0 0;max-width:100%}
  .frow{flex-direction:column;gap:7px}
  .det-grid{grid-template-columns:1fr}
  #map-container{height:calc(100vh - var(--hdr) - var(--tab) - 100px)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.85"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    グルメノート <small>GOURMET NOTE</small>
  </div>
  <span class="save-status" id="save-status"></span>
  <button class="btn btn-white btn-icon" id="btn-save-pc" title="PCに保存 (Ctrl+S)" onclick="triggerSave()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="btn btn-white btn-icon" id="btn-menu" onclick="toggleMenu()" title="設定">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── CONSTANTS ──────────────────────────────────────────────
const SCENES = ['接待','飲み会','ランチ','個室','大人数OK','女子会','デート','カジュアル'];
const DEFAULT_GENRES = ['和食','寿司','焼肉','中華','イタリアン','フレンチ','韓国料理','ラーメン','居酒屋','バー','カフェ','その他'];
const STORE = 'gourmet_v2';
const COLOR_STORE = 'genre_colors_v1';
const DEFAULT_GENRE_COLORS = {
  '和食':    '#e05252',
  '寿司':    '#e07b3c',
  '焼肉':    '#c94a2a',
  '中華':    '#d4a017',
  'イタリアン':'#27ae60',
  'フレンチ': '#8e44ad',
  '韓国料理': '#e84393',
  'ラーメン': '#e8a055',
  '居酒屋':  '#3b7dd8',
  'バー':    '#2c3e50',
  'カフェ':  '#7c9e6e',
  'その他':  '#8a9bb5',
};

// ── STATE ──────────────────────────────────────────────────
let restaurants = [];
let filters = {search:'',genre:'',scenes:[],budget:'',visited:'all'};
let editingId = null, detailId = null;
let formVisits = [];
let leafMap = null, leafMarkers = [], leafTileLayer = null;
let fsaHandle = null, saveTimer = null;
let currentTab = 'list';
let genreColors = {...DEFAULT_GENRE_COLORS};
let pendingColors = {};

// ── STORAGE ────────────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem(STORE);
    restaurants = raw ? JSON.parse(raw) : [];
    restaurants = restaurants.map(migrate);
    if (!raw) fetchSeed();
  } catch { restaurants = []; }
}

function migrate(r) {
  if (!r.visits) {
    r.visits = r.visited && r.visit_date
      ? [{id: uid(), date: r.visit_date, companions: r.companions||'', purpose:'', notes:''}]
      : [];
  }
  return r;
}

async function fetchSeed() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data) && data.length) {
      restaurants = data.map(migrate);
      persist(); render();
      toast('初期データを読み込みました','ok');
    }
  } catch {}
}

function loadColors() {
  try {
    const raw = localStorage.getItem(COLOR_STORE);
    if (raw) genreColors = {...DEFAULT_GENRE_COLORS, ...JSON.parse(raw)};
  } catch {}
}
function saveColors() { localStorage.setItem(COLOR_STORE, JSON.stringify(genreColors)); }
function getGenreColor(genre) { return genreColors[genre] || genreColors['その他'] || '#8a9bb5'; }

function persist() {
  localStorage.setItem(STORE, JSON.stringify(restaurants));
  scheduleAutoSave();
}

function uid() {
  return (crypto?.randomUUID?.()) || (Date.now().toString(36)+Math.random().toString(36).slice(2));
}

// ── AUTO-SAVE ──────────────────────────────────────────────
function scheduleAutoSave() {
  clearTimeout(saveTimer);
  setSaveStatus('pending');
  saveTimer = setTimeout(executeAutoSave, 1500);
}

async function executeAutoSave() {
  if (!fsaHandle) { setSaveStatus(''); return; }
  try {
    const w = await fsaHandle.createWritable();
    await w.write(JSON.stringify(restaurants, null, 2));
    await w.close();
    setSaveStatus('ok');
  } catch { setSaveStatus(''); }
}

function setSaveStatus(s) {
  const el = document.getElementById('save-status');
  if (s === 'ok') {
    el.className = 'save-status ok';
    el.textContent = '✓ 保存済み';
    setTimeout(() => { el.textContent = ''; el.className = 'save-status'; }, 3000);
  } else if (s === 'pending') {
    el.className = 'save-status pending';
    el.textContent = '保存中…';
  } else {
    el.className = 'save-status';
    el.textContent = fsaHandle ? '' : '';
  }
}

async function setupFSA() {
  closeMenu();
  if (!('showSaveFilePicker' in window)) {
    toast('このブラウザはFile System APIに非対応です。Ctrl+Sで手動保存できます','err');
    return;
  }
  try {
    fsaHandle = await window.showSaveFilePicker({
      suggestedName: 'restaurants.json',
      types: [{description:'JSON',accept:{'application/json':['.json']}}]
    });
    toast('自動保存ファイルを設定しました','ok');
    executeAutoSave();
  } catch {}
}

function triggerSave() {
  if (fsaHandle) { executeAutoSave(); return; }
  exportJSON(true);
}

// ── CRUD ───────────────────────────────────────────────────
function addR(data) {
  const now = new Date().toISOString();
  restaurants.unshift({...data, id:uid(), created_at:now, updated_at:now});
  persist();
}
function updateR(id, data) {
  const i = restaurants.findIndex(r=>r.id===id);
  if (i!==-1) { restaurants[i]={...restaurants[i],...data,updated_at:new Date().toISOString()}; persist(); }
}
function deleteR(id) { restaurants=restaurants.filter(r=>r.id!==id); persist(); }
function byId(id) { return restaurants.find(r=>r.id===id); }

// ── GEOCODING ──────────────────────────────────────────────
async function geocodeR(id) {
  const r = byId(id);
  if (!r || r.lat) return;
  const q = r.address || r.station;
  if (!q) return;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' 日本')}&format=json&limit=1`,
      {headers:{'Accept-Language':'ja'}});
    const d = await res.json();
    if (d.length) {
      updateR(id, {lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon)});
      if (currentTab === 'map') renderMap();
    }
  } catch {}
}

// ── GENRES ─────────────────────────────────────────────────
function getGenres() {
  const custom = restaurants.map(r=>r.genre).filter(Boolean);
  return [...new Set([...DEFAULT_GENRES,...custom])];
}

// ── FILTERING ──────────────────────────────────────────────
function getFiltered() {
  return restaurants.filter(r => {
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const hay = [r.name,r.address,r.station,r.notes,r.referrer,r.genre,
        ...(r.visits||[]).map(v=>v.companions+' '+v.purpose)].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (filters.genre && r.genre !== filters.genre) return false;
    if (filters.scenes.length && !filters.scenes.every(s=>(r.scenes||[]).includes(s))) return false;
    if (filters.budget) {
      const b = r.dinner_budget;
      if (filters.budget==='~3000'      && (!b||b>3000))   return false;
      if (filters.budget==='3000~6000'  && (b<3000||b>6000)) return false;
      if (filters.budget==='6000~10000' && (b<6000||b>10000)) return false;
      if (filters.budget==='10000~'     && (!b||b<10000))  return false;
    }
    const vc = (r.visits||[]).length;
    if (filters.visited==='yes' && vc===0) return false;
    if (filters.visited==='no'  && vc>0)  return false;
    return true;
  });
}

// ── RENDER LIST ────────────────────────────────────────────
function render() {
  updateGenreFilter();
  const list = getFiltered();
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');
  const stats = document.getElementById('stats');
  const vc = list.filter(r=>(r.visits||[]).length>0).length;
  stats.textContent = `${list.length}件表示 — 訪問済み ${vc}件 · 未訪問 ${list.length-vc}件`;
  if (list.length===0) { grid.innerHTML=''; empty.classList.remove('hidden'); }
  else { empty.classList.add('hidden'); grid.innerHTML=list.map(renderCard).join(''); }
  if (currentTab==='map') renderMap();
}

function updateGenreFilter() {
  const sel = document.getElementById('s-genre');
  const cur = sel.value;
  sel.innerHTML = '<option value="">ジャンル: 全て</option>' +
    getGenres().map(g=>`<option value="${esc(g)}"${cur===g?' selected':''}>${esc(g)}</option>`).join('');
}

function starsHtml(n) {
  if (!n) return '';
  return `<span class="stars">${'★'.repeat(n)}${'☆'.repeat(5-n)}</span>`;
}
function fmtYen(n) { return n ? '¥'+Number(n).toLocaleString() : null; }
function lastVisit(r) {
  const vs = (r.visits||[]).filter(v=>v.date).sort((a,b)=>b.date.localeCompare(a.date));
  return vs[0]||null;
}

function renderCard(r) {
  const scenes = (r.scenes||[]).map(s=>`<span class="tag tag-${s}">${s}</span>`).join('');
  const bp = [r.lunch_budget&&`L:${fmtYen(r.lunch_budget)}`,r.dinner_budget&&`D:${fmtYen(r.dinner_budget)}`].filter(Boolean);
  const tbl = safeUrl(r.tabelog_url)?`<a class="clink tbl" href="${safeUrl(r.tabelog_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>食べログ</a>`:'';
  const gmap = safeUrl(r.maps_url)?`<a class="clink map" href="${safeUrl(r.maps_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>地図</a>`:'';
  const lv = lastVisit(r);
  const vc = (r.visits||[]).length;
  const vbadge = vc>0
    ? `<span class="vbadge yes"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${vc}回訪問${lv?' · '+lv.date:''}</span>`
    : `<span class="vbadge no">未訪問</span>`;
  const geo = r.lat ? `<span class="geo-badge ok" style="font-size:10px;padding:1px 5px">📍</span>` : '';
  return `
<div class="rcard" onclick="openDet('${r.id}')">
  <div class="card-body">
    <div class="card-top">
      <div class="card-name">${esc(r.name)} ${geo}</div>

// ── MAP ────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-list').classList.toggle('active', tab==='list');
  document.getElementById('tab-map').classList.toggle('active', tab==='map');
  document.getElementById('list-view').classList.toggle('hidden-view', tab==='map');
  document.getElementById('map-view').classList.toggle('active', tab==='map');
  if (tab==='map') { setTimeout(renderMap, 50); }
}

function createPinIcon(genre) {
  const color = getGenreColor(genre);
  const svg = `<div class="map-pin-wrap"><svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg">
    <path d="M13 1C7.48 1 3 5.48 3 11c0 8 10 22 10 22s10-14 10-22C23 5.48 18.52 1 13 1z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="13" cy="11" r="4.5" fill="white" opacity="0.85"/>
  </svg></div>`;
  return L.divIcon({ className:'', html:svg, iconSize:[26,34], iconAnchor:[13,34], popupAnchor:[0,-36] });
}

function renderMap() {
  if (!leafMap) {
    leafMap = L.map('map-container', {zoomControl:true}).setView([35.6762,139.6503], 12);
    leafTileLayer = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      { attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>', subdomains:'abcd', maxZoom:20 }
    ).addTo(leafMap);
  }
  leafMarkers.forEach(m=>m.remove());
  leafMarkers=[];
  const list = getFiltered().filter(r=>r.lat&&r.lng);
  list.forEach(r=>{
    const lv = lastVisit(r);
    const vc = (r.visits||[]).length;
    const color = getGenreColor(r.genre);
    const popHtml = `<div class="map-popup">
      <div class="pname">${esc(r.name)}</div>
      <div class="pmeta">${r.genre?`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle"></span>${esc(r.genre)}&nbsp;·&nbsp;`:''} ${vc>0?vc+'回訪問':'未訪問'}</div>
      ${lv?`<div class="pmeta">最終: ${lv.date}</div>`:''}
      <button class="pbtn" onclick="openDet('${r.id}');document.querySelectorAll('.leaflet-popup-close-button').forEach(e=>e.click())">詳細を見る</button>
    </div>`;
    const marker = L.marker([r.lat,r.lng], {icon: createPinIcon(r.genre)}).bindPopup(popHtml).addTo(leafMap);
    leafMarkers.push(marker);
  });
  if (leafMarkers.length>0) {
    const fg = L.featureGroup(leafMarkers);
    leafMap.fitBounds(fg.getBounds().pad(0.15));
  }
  renderLegend();
  const noGeo = getFiltered().filter(r=>!r.lat&&(r.address||r.station));
  if (noGeo.length) {
    document.getElementById('stats').textContent += ` ／ 地図未取得 ${noGeo.length}件（取得中）`;
    noGeo.slice(0,5).forEach((r,i)=>setTimeout(()=>geocodeR(r.id), i*1100));
  }
}

function renderLegend() {
  const plotted = getFiltered().filter(r=>r.lat&&r.lng);
  const usedGenres = [...new Set(plotted.map(r=>r.genre||'不明'))];
  const leg = document.getElementById('map-legend');
  if (!leg) return;
  if (usedGenres.length===0) { leg.innerHTML='<span style="font-size:11px;color:var(--text-lt)">プロット済みの店舗がありません</span>'; return; }
  leg.innerHTML = usedGenres.map(g=>`
    <span class="legend-item" onclick="filterByGenre('${esc(g)}')" title="クリックでフィルター">
      <span class="legend-dot" style="background:${getGenreColor(g)}"></span>${esc(g)}
    </span>`).join('');
}

function filterByGenre(g) {
  switchTab('list');
  filters.genre = g;
  document.getElementById('s-genre').value = g;
  render();
}

async function shareRestaurant() {
  const r = byId(detailId); if (!r) return;
  const lv = lastVisit(r);
  const vc = (r.visits||[]).length;
  const text = [
    r.name,
    r.genre?`【${r.genre}】`:'',
    r.station||r.address||'',
    (r.scenes||[]).join(' / '),
    r.dinner_budget?`ディナー ${fmtYen(r.dinner_budget)}`:'',
    r.private_room?'個室あり':'',
    vc>0?`${vc}回訪問（最終: ${lv?.date||''}）`:'未訪問',
    r.tabelog_url||'',
  ].filter(Boolean).join('\n');
  if (navigator.share) {
    try { await navigator.share({title:r.name,text}); } catch(e) { if(e.name==='AbortError') return; }
  } else {
    try { await navigator.clipboard.writeText(text); toast('クリップボードにコピーしました','ok'); } catch { toast('コピーできませんでした','err'); }
  }
}

function syncVisitsFromDOM() {

    formVisits[i].companions = el.querySelector('.vcomp')?.value.trim()||'';
    formVisits[i].purpose    = el.querySelector('.vpurp')?.value.trim()||'';
    formVisits[i].notes      = el.querySelector('.vnote')?.value.trim()||'';
  });

function addVisit() {
  syncVisitsFromDOM();
  formVisits.push({id:uid(), date:new Date().toISOString().slice(0,10), companions:'', purpose:'', notes:''});

function removeVisit(i) {
  syncVisitsFromDOM();
  formVisits.splice(i,1);

function collectVisits() {
  syncVisitsFromDOM();

// ── SAVE RESTAURANT ────────────────────────────────────────
function saveRestaurant() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('店名は必須です','err'); return; }
  const scenes = Array.from(document.querySelectorAll('input[name="scenes"]:checked')).map(e=>e.value);
  const ratingEl = document.querySelector('input[name="rating"]:checked');
  const lv=document.getElementById('f-lunch').value, dv=document.getElementById('f-dinner').value;
  const visits = collectVisits();
  const data = {
    name,
    genre:                document.getElementById('f-genre').value.trim(),
    address:              document.getElementById('f-addr').value.trim(),
    station:              document.getElementById('f-station').value.trim(),
    tabelog_url:          document.getElementById('f-tbl').value.trim(),
    maps_url:             document.getElementById('f-maps').value.trim(),
    referrer:             document.getElementById('f-ref').value.trim(),
    visits,
    scenes,
    private_room:         document.getElementById('f-pr').checked,
    requires_reservation: document.getElementById('f-rsv').checked,
    has_parking:          document.getElementById('f-pk').checked,
    smoking:              document.getElementById('f-smoke').value,
    lunch_budget:         lv?parseInt(lv):null,
    dinner_budget:        dv?parseInt(dv):null,
    rating:               ratingEl?parseInt(ratingEl.value):null,
    notes:                document.getElementById('f-notes').value.trim(),
  };
  const isNew = !editingId;
  if (editingId) {
    const old = byId(editingId);
    data.lat = old?.lat; data.lng = old?.lng;
    updateR(editingId, data);
    toast('保存しました','ok');
  } else {
    addR(data);
    toast('店舗を追加しました','ok');
  }
  closeForm(); render();
  // trigger geocoding if new address
  if (isNew || !data.lat) {
    const newest = restaurants[0];
    if (newest && !newest.lat && (newest.address||newest.station)) {
      setTimeout(()=>geocodeR(newest.id), 500);
    }
  }
}

function deleteEditing() {
  if (!editingId) return;
  const r=byId(editingId);
  if (!confirm(`「${r?.name}」を削除しますか？`)) return;
  deleteR(editingId); closeForm(); render(); toast('削除しました');
}

// ── DATA MENU ──────────────────────────────────────────────
function toggleMenu() { document.getElementById('data-menu').classList.toggle('hidden'); }
function closeMenu()  { document.getElementById('data-menu').classList.add('hidden'); }

function exportJSON(silent=false) {
  if (!silent) closeMenu();
  const blob=new Blob([JSON.stringify(restaurants,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`restaurants_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  if (!silent) toast(`${restaurants.length}件をエクスポートしました`,'ok');
}

function importJSON(ev) {
  closeMenu();
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(!confirm(`${data.length}件インポートします。現在のデータは置き換わります。`)) return;
      restaurants=data.map(migrate); persist(); render();
      toast(`${data.length}件インポートしました`,'ok');
    } catch { toast('インポート失敗：JSONを確認してください','err'); }
    ev.target.value='';
  };
  reader.readAsText(file);
}

function clearAll() {
  closeMenu();
  if (!confirm('全データを削除します。取り消せません。')) return;
  restaurants=[]; persist(); render(); toast('全データを削除しました');
}

// ── FILTER HANDLERS ────────────────────────────────────────
let searchTimer=null;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ filters.search=document.getElementById('s-search').value.trim(); render(); },200);
}
function onFilter() {
  filters.genre=document.getElementById('s-genre').value;
  filters.budget=document.getElementById('s-budget').value;
  render();
}
function setVisited(v) {
  filters.visited=v;
  document.querySelectorAll('.vtog button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  render();
}
function toggleScene(s) {
  const i=filters.scenes.indexOf(s);
  i===-1?filters.scenes.push(s):filters.scenes.splice(i,1);
  paintPills(); render();
}
function paintPills() {
  document.getElementById('scene-pills').innerHTML=
    '<span style="font-size:12px;color:var(--text-lt);align-self:center;white-space:nowrap">シーン:</span>'+
    SCENES.map(s=>`<button class="scene-pill${filters.scenes.includes(s)?' on':''}" onclick="toggleScene('${s}')">${s}</button>`).join('');
}
function clearFilters() {
  filters={search:'',genre:'',scenes:[],budget:'',visited:'all'};
  document.getElementById('s-search').value='';
  document.getElementById('s-genre').value='';
  document.getElementById('s-budget').value='';
  document.querySelectorAll('.vtog button').forEach(b=>b.classList.toggle('on',b.dataset.v==='all'));
  paintPills(); render();
}

// ── UTILS ──────────────────────────────────────────────────
function esc(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeUrl(u) { return u&&/^https?:\/\//i.test(u)?esc(u):''; }

function toast(msg,type='') {
  const el=document.createElement('div');
  el.className=`toast${type?' '+type:''}`;
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },2600);
}

// ── GLOBAL EVENTS ──────────────────────────────────────────
document.addEventListener('click',e=>{
  if(!e.target.closest('#btn-menu')&&!e.target.closest('#data-menu')) closeMenu();
  if(e.target===document.getElementById('modal-form')) closeForm();
  if(e.target===document.getElementById('modal-detail')) closeDet();
  if(e.target===document.getElementById('modal-color')) closeColorSettings();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeForm(); closeDet(); closeMenu(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); triggerSave(); }
});

// ── INIT ───────────────────────────────────────────────────
loadColors();
load();
paintPills();
renderVisitsSection();
render();
</script>
</body>
</html>
