<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グルメノート</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --bg: #f1f5f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  --shadow: 0 2px 4px rgba(0,0,0,.06), 0 4px 6px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --header-h: 60px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* === Header === */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--primary);
  color: white;
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  box-shadow: var(--shadow);
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -.3px;
  flex: 1;
}
.header-title span {
  font-size: 12px;
  font-weight: 400;
  opacity: .7;
  margin-left: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: background .15s, transform .1s;
  line-height: 1;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: white; color: var(--primary); }
.btn-primary:hover { background: #e0eaff; }
.btn-ghost { background: rgba(255,255,255,.15); color: white; }
.btn-ghost:hover { background: rgba(255,255,255,.25); }
.btn-icon { padding: 8px 10px; font-size: 15px; }

/* === Filter Bar === */
.filter-bar {
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: var(--shadow-sm);
}
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-search {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.filter-search input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
  font-family: var(--font);
}
.filter-search input:focus { border-color: var(--primary); background: white; }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 14px;
}
.filter-select {
  padding: 7px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  font-family: var(--font);
}
.filter-select:focus { border-color: var(--primary); }

.scene-pill {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  transition: all .15s;
  user-select: none;
  white-space: nowrap;
}
.scene-pill:hover { border-color: var(--primary); color: var(--primary); }
.scene-pill.active { background: var(--primary); border-color: var(--primary); color: white; }

.visited-toggle {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--bg);
}
.visited-toggle button {
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  transition: all .15s;
  font-family: var(--font);
}
.visited-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
.visited-toggle button.active { background: var(--primary); color: white; }

.clear-btn {
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: color .15s;
  font-family: var(--font);
}
.clear-btn:hover { color: var(--danger); }

/* === Stats Bar === */
.stats-bar {
  padding: 6px 16px;
  font-size: 12px;
  color: var(--text-muted);
}

/* === Card Grid === */
.card-grid {
  padding: 8px 16px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.restaurant-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: box-shadow .2s, transform .15s;
  overflow: hidden;
}
.restaurant-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

.card-body { padding: 14px; }

.card-header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  flex: 1;
}
.genre-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
  background: #e0e7ff;
  color: #3730a3;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-stars { color: #f59e0b; letter-spacing: 1px; }

.card-scenes {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.tag-接待      { background: #dbeafe; color: #1e40af; }
.tag-飲み会    { background: #ede9fe; color: #5b21b6; }
.tag-ランチ    { background: #fed7aa; color: #92400e; }
.tag-個室      { background: #d1fae5; color: #065f46; }
.tag-大人数OK  { background: #dcfce7; color: #14532d; }
.tag-女子会    { background: #fce7f3; color: #831843; }
.tag-デート    { background: #ffe4e6; color: #9f1239; }
.tag-カジュアル { background: #f1f5f9; color: #334155; }

.card-budget {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.card-budget b { color: var(--text); }

.card-visited-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
}
.visited-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 600;
  font-size: 11px;
}
.visited-yes { background: #d1fae5; color: #065f46; }
.visited-no  { background: #fef3c7; color: #78350f; }
.card-referrer { color: var(--text-muted); font-size: 11px; }

.card-footer {
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  background: #fafbfc;
  flex-wrap: wrap;
  align-items: center;
}
.card-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  border: 1px solid var(--border);
  background: white;
  color: var(--text);
  transition: all .15s;
  font-family: var(--font);
  line-height: 1.2;
}
.card-action-btn:hover { background: var(--bg); border-color: var(--primary); color: var(--primary); }
.card-action-btn.tabelog { border-color: #ea8c2b; color: #c96d00; }
.card-action-btn.tabelog:hover { background: #fff7ed; }
.card-action-btn.maps { border-color: #0f9d58; color: #0a7a44; }
.card-action-btn.maps:hover { background: #f0fdf4; }
.card-edit-btn {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-muted);
  transition: all .15s;
  font-family: var(--font);
}
.card-edit-btn:hover { border-color: var(--primary); color: var(--primary); }

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 52px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 14px; }
.hidden { display: none !important; }

/* === Data Menu === */
.data-menu {
  position: fixed;
  top: calc(var(--header-h) + 8px);
  right: 12px;
  z-index: 200;
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 6px 0;
  min-width: 170px;
}
.menu-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 9px 16px;
  font-size: 13px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text);
  font-family: var(--font);
  transition: background .1s;
}
.menu-item:hover { background: var(--bg); }
.menu-item.danger { color: var(--danger); }
.menu-divider { margin: 4px 0; border: none; border-top: 1px solid var(--border); }

/* === Modal === */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 580px;
  box-shadow: var(--shadow-lg);
  margin: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-muted);
  padding: 4px 6px;
  line-height: 1;
  border-radius: 4px;
  font-family: var(--font);
}
.modal-close:hover { color: var(--text); background: var(--bg); }
.modal-body {
  padding: 20px;
  overflow-y: auto;
  max-height: calc(100vh - 180px);
}
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  flex-wrap: wrap;
  align-items: center;
}

/* === Form === */
.form-section { margin-bottom: 20px; }
.form-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}
.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.form-label .req { color: var(--danger); margin-left: 2px; }
.form-input {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color .15s;
  font-family: var(--font);
}
.form-input:focus { border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: 11px; color: var(--text-light); }

.scene-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; }
.scene-cb { display: none; }
.scene-cb-label {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  transition: all .15s;
  user-select: none;
}
.scene-cb:checked + .scene-cb-label {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.star-rating { display: flex; gap: 4px; flex-direction: row-reverse; justify-content: flex-end; }
.star-rating input { display: none; }
.star-rating label {
  font-size: 26px;
  color: #d1d5db;
  cursor: pointer;
  transition: color .1s;
}
.star-rating label:hover,
.star-rating label:hover ~ label,
.star-rating input:checked ~ label { color: #f59e0b; }

.checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
.cb-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  cursor: pointer;
}
.cb-item input { cursor: pointer; }

/* === Detail Modal === */
.detail-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: all .15s;
  border: 1.5px solid;
}
.detail-link.tabelog { background: #fff7ed; color: #c96d00; border-color: #fed7aa; }
.detail-link.tabelog:hover { background: #ffedd5; }
.detail-link.maps { background: #f0fdf4; color: #0a7a44; border-color: #a7f3d0; }
.detail-link.maps:hover { background: #dcfce7; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.detail-block .detail-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.detail-block .detail-val { font-size: 14px; color: var(--text); }
.detail-big-stars { font-size: 20px; color: #f59e0b; }
.detail-notes {
  margin-top: 14px;
  padding: 12px 14px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text);
}
.detail-meta {
  margin-top: 14px;
  font-size: 11px;
  color: var(--text-light);
}
.btn-copy {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--text-muted);
  transition: all .15s;
  font-family: var(--font);
}
.btn-copy:hover { border-color: var(--primary); color: var(--primary); }

/* === Toast === */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  align-items: center;
}
.toast {
  background: #1e293b;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toast-in .25s ease;
  pointer-events: auto;
  white-space: nowrap;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 640px) {
  .card-grid { grid-template-columns: 1fr; padding: 8px 12px 80px; }
  .filter-bar { padding: 8px 12px; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-box { border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-width: 100%; }
  .form-row { flex-direction: column; gap: 8px; }
  .detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">🍽 グルメノート<span>飲食店まとめ</span></div>
  <button class="btn btn-ghost btn-icon" id="btn-menu" title="データ管理" onclick="toggleMenu()">⚙️</button>
  <button class="btn btn-primary" onclick="openAddModal()">＋ 追加</button>
</header>

<!-- Data Menu -->
<div class="data-menu hidden" id="data-menu">
  <button class="menu-item" onclick="exportData()">📥 JSONエクスポート</button>
  <label class="menu-item" style="cursor:pointer">
    📤 JSONインポート
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </label>
  <hr class="menu-divider">
  <button class="menu-item danger" onclick="clearAllData()">🗑 全データ削除</button>
</div>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-row">
    <div class="filter-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="店名・エリア・駅名・紹介者で検索..." oninput="onSearchInput()">
    </div>
    <select class="filter-select" id="genre-select" onchange="onFilterChange()">
      <option value="">ジャンル: 全て</option>
    </select>
    <select class="filter-select" id="budget-select" onchange="onFilterChange()">
      <option value="">予算: 全て</option>
      <option value="~3000">〜¥3,000</option>
      <option value="3000~6000">¥3,000〜6,000</option>
      <option value="6000~10000">¥6,000〜10,000</option>
      <option value="10000~">¥10,000〜</option>
    </select>
    <div class="visited-toggle">
      <button class="active" data-v="all" onclick="setVisited('all')">全て</button>
      <button data-v="visited" onclick="setVisited('visited')">訪問済み</button>
      <button data-v="unvisited" onclick="setVisited('unvisited')">未訪問</button>
    </div>
    <button class="clear-btn" onclick="clearFilters()">× クリア</button>
  </div>
  <div class="filter-row" id="scene-pills"></div>
</div>

<div class="stats-bar" id="stats-bar"></div>
<main class="card-grid" id="card-grid"></main>
<div class="empty-state hidden" id="empty-state">
  <div class="empty-state-icon">🍽</div>
  <h3>店舗が見つかりません</h3>
  <p>フィルターを変えるか、右上の「＋ 追加」で登録してください</p>
</div>

<!-- Form Modal -->
<div class="modal-overlay hidden" id="modal-form">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="form-title">店舗を追加</span>
      <button class="modal-close" onclick="closeFormModal()">✕</button>
    </div>
    <div class="modal-body" id="form-body"></div>
    <div class="modal-footer">
      <button class="btn" style="background:var(--bg);color:var(--text);border:1px solid var(--border);" onclick="closeFormModal()">キャンセル</button>
      <button class="btn" style="background:var(--bg);color:var(--danger);border:1px solid #fca5a5;margin-right:auto;display:none" id="btn-delete" onclick="deleteEditing()">🗑 削除</button>
      <button class="btn btn-primary" onclick="saveRestaurant()">💾 保存</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="modal-detail">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="detail-name">詳細</span>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-copy" onclick="copyInfo()">📋 紹介用コピー</button>
      <button class="btn" style="background:var(--bg);color:var(--text);border:1px solid var(--border);" onclick="closeDetailModal()">閉じる</button>
      <button class="btn btn-primary" onclick="editFromDetail()">✏️ 編集</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const SCENES        = ['接待', '飲み会', 'ランチ', '個室', '大人数OK', '女子会', 'デート', 'カジュアル'];
const DEFAULT_GENRES = ['和食', '寿司', '焼肉', '中華', 'イタリアン', 'フレンチ', '韓国料理', 'ラーメン', '居酒屋', 'バー', 'カフェ', 'その他'];
const STORAGE = 'gourmet_note_v1';

function getGenres() {
  const custom = restaurants.map(r => r.genre).filter(Boolean);
  return [...new Set([...DEFAULT_GENRES, ...custom])];
}

// ============================================================
// STATE
// ============================================================
let restaurants = [];
let filters = { search: '', genre: '', scenes: [], budget: '', visited: 'all' };
let editingId   = null;
let detailId    = null;

// ============================================================
// STORAGE
// ============================================================
function load() {
  try {
    const raw = localStorage.getItem(STORAGE);
    restaurants = raw ? JSON.parse(raw) : [];
    if (!raw) fetchSeed();
  } catch { restaurants = []; }
}

async function fetchSeed() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      restaurants = data;
      persist();
      render();
      toast('初期データを読み込みました', 'success');
    }
  } catch { /* no data.json */ }
}

function persist() {
  localStorage.setItem(STORAGE, JSON.stringify(restaurants));
}

function uid() {
  return (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ============================================================
// CRUD
// ============================================================
function add(data) {
  const now = new Date().toISOString();
  restaurants.unshift({ ...data, id: uid(), created_at: now, updated_at: now });
  persist();
}

function update(id, data) {
  const i = restaurants.findIndex(r => r.id === id);
  if (i !== -1) {
    restaurants[i] = { ...restaurants[i], ...data, updated_at: new Date().toISOString() };
    persist();
  }
}

function remove(id) {
  restaurants = restaurants.filter(r => r.id !== id);
  persist();
}

function byId(id) { return restaurants.find(r => r.id === id); }

// ============================================================
// FILTERING
// ============================================================
function filtered() {
  return restaurants.filter(r => {
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const hay = [r.name, r.address, r.station, r.notes, r.referrer, r.companions, r.genre]
        .filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (filters.genre && r.genre !== filters.genre) return false;
    if (filters.scenes.length) {
      if (!filters.scenes.every(s => (r.scenes || []).includes(s))) return false;
    }
    if (filters.budget) {
      const b = r.dinner_budget;
      if (filters.budget === '~3000'      && (!b || b > 3000))  return false;
      if (filters.budget === '3000~6000'  && (b < 3000 || b > 6000)) return false;
      if (filters.budget === '6000~10000' && (b < 6000 || b > 10000)) return false;
      if (filters.budget === '10000~'     && (!b || b < 10000)) return false;
    }
    if (filters.visited === 'visited'   && !r.visited) return false;
    if (filters.visited === 'unvisited' &&  r.visited) return false;
    return true;
  });
}

// ============================================================
// RENDER
// ============================================================
function updateGenreFilter() {
  const sel     = document.getElementById('genre-select');
  const current = sel.value;
  sel.innerHTML = '<option value="">ジャンル: 全て</option>' +
    getGenres().map(g => `<option value="${esc(g)}"${current === g ? ' selected' : ''}>${esc(g)}</option>`).join('');
}

function render() {
  updateGenreFilter();
  const list = filtered();
  const grid  = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');
  const stats = document.getElementById('stats-bar');

  const vc = list.filter(r => r.visited).length;
  stats.textContent = `${list.length}件表示（訪問済み ${vc}件 · 未訪問 ${list.length - vc}件）`;

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = list.map(card).join('');
  }
}

function stars(n) {
  if (!n) return '';
  return `<span class="card-stars">${'★'.repeat(n)}${'☆'.repeat(5 - n)}</span>`;
}

function fmt(n) { return n ? '¥' + Number(n).toLocaleString() : null; }

function card(r) {
  const scenes = (r.scenes || []).map(s => `<span class="tag tag-${s}">${s}</span>`).join('');
  const bp = [r.lunch_budget && `L:${fmt(r.lunch_budget)}`, r.dinner_budget && `D:${fmt(r.dinner_budget)}`].filter(Boolean);
  const budgetHtml = bp.length ? `<div class="card-budget">${bp.join(' &nbsp;·&nbsp; ')}</div>` : '';
  const tabelogBtn = safeUrl(r.tabelog_url)
    ? `<a class="card-action-btn tabelog" href="${safeUrl(r.tabelog_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">食べログ</a>` : '';
  const mapsBtn = safeUrl(r.maps_url)
    ? `<a class="card-action-btn maps" href="${safeUrl(r.maps_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📍 地図</a>` : '';
  const visitedBadge = r.visited
    ? '<span class="visited-badge visited-yes">✓ 訪問済み</span>'
    : '<span class="visited-badge visited-no">◎ 未訪問</span>';

  return `
<div class="restaurant-card" onclick="openDetail('${r.id}')">
  <div class="card-body">
    <div class="card-header-row">
      <div class="card-name">${esc(r.name)}</div>
      ${r.genre ? `<span class="genre-badge">${esc(r.genre)}</span>` : ''}
    </div>
    <div class="card-meta">
      ${stars(r.rating)}
      ${r.station ? `<span>📍 ${esc(r.station)}</span>` : (r.address ? `<span>📍 ${esc(r.address)}</span>` : '')}
    </div>
    ${scenes ? `<div class="card-scenes">${scenes}</div>` : ''}
    ${budgetHtml}
    <div class="card-visited-row">
      ${visitedBadge}
      ${r.referrer ? `<span class="card-referrer">紹介: ${esc(r.referrer)}</span>` : ''}
    </div>
  </div>
  <div class="card-footer">
    ${tabelogBtn}${mapsBtn}
    <button class="card-edit-btn" onclick="event.stopPropagation();openEdit('${r.id}')">✏️ 編集</button>
  </div>
</div>`;
}

// ============================================================
// DETAIL MODAL
// ============================================================
function openDetail(id) {
  const r = byId(id);
  if (!r) return;
  detailId = id;
  document.getElementById('detail-name').textContent = r.name;
  document.getElementById('detail-body').innerHTML = renderDetail(r);
  document.getElementById('modal-detail').classList.remove('hidden');
}

function renderDetail(r) {
  const scenes = (r.scenes || []).map(s => `<span class="tag tag-${s}">${s}</span>`).join(' ');
  const bp = [r.lunch_budget && `ランチ: ${fmt(r.lunch_budget)}`, r.dinner_budget && `ディナー: ${fmt(r.dinner_budget)}`].filter(Boolean).join(' / ');
  const flags = [r.private_room && '個室あり', r.requires_reservation && '要予約', r.has_parking && '駐車場あり', r.smoking].filter(Boolean).join(' · ');

  const links = [
    safeUrl(r.tabelog_url) ? `<a class="detail-link tabelog" href="${safeUrl(r.tabelog_url)}" target="_blank" rel="noopener">🍴 食べログで見る</a>` : '',
    safeUrl(r.maps_url)    ? `<a class="detail-link maps"    href="${safeUrl(r.maps_url)}"    target="_blank" rel="noopener">📍 Google Maps</a>` : '',
  ].filter(Boolean).join('');

  return `
${links ? `<div class="detail-links">${links}</div>` : ''}
<div class="detail-grid">
  ${r.genre    ? `<div class="detail-block"><div class="detail-label">ジャンル</div><div class="detail-val">${esc(r.genre)}</div></div>` : ''}
  ${r.rating   ? `<div class="detail-block"><div class="detail-label">評価</div><div class="detail-big-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div>` : ''}
  ${r.address  ? `<div class="detail-block"><div class="detail-label">住所</div><div class="detail-val">${esc(r.address)}</div></div>` : ''}
  ${r.station  ? `<div class="detail-block"><div class="detail-label">最寄り駅</div><div class="detail-val">${esc(r.station)}</div></div>` : ''}
  ${bp         ? `<div class="detail-block"><div class="detail-label">予算</div><div class="detail-val">${bp}</div></div>` : ''}
  ${flags      ? `<div class="detail-block"><div class="detail-label">設備・条件</div><div class="detail-val">${flags}</div></div>` : ''}
</div>
${scenes ? `<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px">シーン</div><div class="card-scenes">${scenes}</div></div>` : ''}
<div class="detail-grid" style="margin-top:12px">
  <div class="detail-block">
    <div class="detail-label">訪問状況</div>
    <div class="detail-val">
      ${r.visited
        ? `<span class="visited-badge visited-yes" style="display:inline-flex">✓ 訪問済み</span>${r.visit_date ? ' — ' + r.visit_date : ''}`
        : '<span class="visited-badge visited-no" style="display:inline-flex">◎ 紹介のみ（未訪問）</span>'}
    </div>
  </div>
  ${r.referrer   ? `<div class="detail-block"><div class="detail-label">紹介者</div><div class="detail-val">${esc(r.referrer)}</div></div>` : ''}
  ${r.companions ? `<div class="detail-block"><div class="detail-label">同行者</div><div class="detail-val">${esc(r.companions)}</div></div>` : ''}
</div>
${r.notes ? `<div class="detail-notes">${esc(r.notes)}</div>` : ''}
<div class="detail-meta">登録: ${r.created_at ? new Date(r.created_at).toLocaleDateString('ja-JP') : '不明'}${r.updated_at !== r.created_at ? ' / 更新: ' + new Date(r.updated_at).toLocaleDateString('ja-JP') : ''}</div>`;
}

function closeDetailModal() {
  document.getElementById('modal-detail').classList.add('hidden');
  detailId = null;
}

function editFromDetail() {
  const id = detailId;
  closeDetailModal();
  openEdit(id);
}

function copyInfo() {
  const r = byId(detailId);
  if (!r) return;
  const lines = [
    r.name,
    r.genre ? `【${r.genre}】` : '',
    r.station || r.address || '',
    (r.scenes || []).length ? r.scenes.join(' / ') : '',
    [r.dinner_budget && `ディナー ${fmt(r.dinner_budget)}`, r.private_room && '個室あり'].filter(Boolean).join(' · '),
    r.tabelog_url || '',
    r.notes ? `メモ: ${r.notes}` : '',
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(lines)
    .then(() => toast('紹介用テキストをコピーしました', 'success'))
    .catch(() => toast('コピーできませんでした', 'error'));
}

// ============================================================
// FORM MODAL
// ============================================================
function openAddModal() {
  editingId = null;
  document.getElementById('form-title').textContent = '店舗を追加';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('form-body').innerHTML = renderForm(null);
  document.getElementById('modal-form').classList.remove('hidden');
}

function openEdit(id) {
  const r = byId(id);
  if (!r) return;
  editingId = id;
  document.getElementById('form-title').textContent = '店舗を編集';
  document.getElementById('btn-delete').style.display = 'inline-flex';
  document.getElementById('form-body').innerHTML = renderForm(r);
  document.getElementById('modal-form').classList.remove('hidden');
}

function renderForm(r) {
  const v  = (f, d = '') => r ? (r[f] != null ? r[f] : d) : d;
  const ck = (f) => r && r[f] ? 'checked' : '';
  const sc = (n) => r && r.rating === n ? 'checked' : '';

  const sceneCbs = SCENES.map(s => {
    const ch = r && (r.scenes || []).includes(s) ? 'checked' : '';
    return `<input type="checkbox" class="scene-cb" id="sc-${s}" name="scenes" value="${s}" ${ch}><label class="scene-cb-label" for="sc-${s}">${s}</label>`;
  }).join('');

  const genreDatalist = getGenres().map(g => `<option value="${esc(g)}">`).join('');

  return `
<div class="form-section">
  <div class="form-section-title">基本情報</div>
  <datalist id="genre-datalist">${genreDatalist}</datalist>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">店名 <span class="req">*</span></label>
      <input type="text" class="form-input" id="f-name" value="${esc(v('name'))}" placeholder="例: 鮨 はせべ">
    </div>
    <div class="form-group" style="max-width:150px">
      <label class="form-label">ジャンル</label>
      <input type="text" class="form-input" id="f-genre" list="genre-datalist" value="${esc(v('genre'))}" placeholder="和食、焼肉など">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">住所</label>
      <input type="text" class="form-input" id="f-address" value="${esc(v('address'))}" placeholder="例: 東京都渋谷区道玄坂1-2-3">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">最寄り駅・徒歩</label>
      <input type="text" class="form-input" id="f-station" value="${esc(v('station'))}" placeholder="例: 渋谷駅 徒歩3分">
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">外部リンク</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">食べログURL</label>
      <input type="url" class="form-input" id="f-tabelog" value="${esc(v('tabelog_url'))}" placeholder="https://tabelog.com/...">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Google Maps URL</label>
      <input type="url" class="form-input" id="f-maps" value="${esc(v('maps_url'))}" placeholder="https://maps.google.com/...">
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">来歴・紹介</div>
  <div class="form-row">
    <div class="form-group">
      <label class="cb-item">
        <input type="checkbox" id="f-visited" ${ck('visited')} onchange="toggleVisitBlock()">
        <span>訪問済み（実際に行った）</span>
      </label>
    </div>
  </div>
  <div id="visit-block" style="${r && r.visited ? '' : 'display:none'}">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">訪問日</label>
        <input type="date" class="form-input" id="f-date" value="${esc(v('visit_date'))}">
      </div>
      <div class="form-group">
        <label class="form-label">同行者</label>
        <input type="text" class="form-input" id="f-companions" value="${esc(v('companions'))}" placeholder="例: 田中さん、鈴木さん">
      </div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">紹介してくれた人</label>
      <input type="text" class="form-input" id="f-referrer" value="${esc(v('referrer'))}" placeholder="例: 田中部長">
      <span class="form-hint">誰から教えてもらったか（未訪問でも記録可）</span>
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">シーン・設備</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">シーン（複数選択可）</label>
      <div class="scene-checkboxes" style="margin-top:6px">${sceneCbs}</div>
    </div>
  </div>
  <div class="form-row" style="margin-top:4px">
    <div class="form-group">
      <div class="checkbox-group">
        <label class="cb-item"><input type="checkbox" id="f-proom" ${ck('private_room')}> 個室あり</label>
        <label class="cb-item"><input type="checkbox" id="f-resv"  ${ck('requires_reservation')}> 要予約</label>
        <label class="cb-item"><input type="checkbox" id="f-park"  ${ck('has_parking')}> 駐車場あり</label>
      </div>
    </div>
    <div class="form-group" style="max-width:130px">
      <label class="form-label">喫煙</label>
      <select class="form-input" id="f-smoke">
        <option value="">未設定</option>
        <option value="禁煙"  ${v('smoking')==='禁煙'  ? 'selected':''}>禁煙</option>
        <option value="喫煙可" ${v('smoking')==='喫煙可' ? 'selected':''}>喫煙可</option>
        <option value="分煙"  ${v('smoking')==='分煙'  ? 'selected':''}>分煙</option>
      </select>
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">予算・評価</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">ランチ（円/人）</label>
      <input type="number" class="form-input" id="f-lunch" value="${v('lunch_budget')}" placeholder="例: 1500" min="0" step="100">
    </div>
    <div class="form-group">
      <label class="form-label">ディナー（円/人）</label>
      <input type="number" class="form-input" id="f-dinner" value="${v('dinner_budget')}" placeholder="例: 8000" min="0" step="100">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">評価</label>
      <div class="star-rating">
        <input type="radio" id="s5" name="rating" value="5" ${sc(5)}><label for="s5">★</label>
        <input type="radio" id="s4" name="rating" value="4" ${sc(4)}><label for="s4">★</label>
        <input type="radio" id="s3" name="rating" value="3" ${sc(3)}><label for="s3">★</label>
        <input type="radio" id="s2" name="rating" value="2" ${sc(2)}><label for="s2">★</label>
        <input type="radio" id="s1" name="rating" value="1" ${sc(1)}><label for="s1">★</label>
      </div>
    </div>
  </div>
</div>

<div class="form-section">
  <div class="form-section-title">メモ</div>
  <div class="form-group">
    <textarea class="form-input form-textarea" id="f-notes" placeholder="料理の感想、注意点、紹介時の一言など...">${esc(v('notes'))}</textarea>
  </div>
</div>`;
}

function toggleVisitBlock() {
  const vis = document.getElementById('f-visited').checked;
  document.getElementById('visit-block').style.display = vis ? '' : 'none';
}

function closeFormModal() {
  document.getElementById('modal-form').classList.add('hidden');
  editingId = null;
}

function saveRestaurant() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('店名は必須です', 'error'); return; }

  const selectedScenes = Array.from(document.querySelectorAll('input[name="scenes"]:checked')).map(el => el.value);
  const ratingEl = document.querySelector('input[name="rating"]:checked');
  const lunchV   = document.getElementById('f-lunch').value;
  const dinnerV  = document.getElementById('f-dinner').value;

  const data = {
    name,
    genre:                document.getElementById('f-genre').value,
    address:              document.getElementById('f-address').value.trim(),
    station:              document.getElementById('f-station').value.trim(),
    tabelog_url:          document.getElementById('f-tabelog').value.trim(),
    maps_url:             document.getElementById('f-maps').value.trim(),
    visited:              document.getElementById('f-visited').checked,
    visit_date:           document.getElementById('f-date').value,
    companions:           document.getElementById('f-companions').value.trim(),
    referrer:             document.getElementById('f-referrer').value.trim(),
    scenes:               selectedScenes,
    private_room:         document.getElementById('f-proom').checked,
    requires_reservation: document.getElementById('f-resv').checked,
    has_parking:          document.getElementById('f-park').checked,
    smoking:              document.getElementById('f-smoke').value,
    lunch_budget:         lunchV  ? parseInt(lunchV)  : null,
    dinner_budget:        dinnerV ? parseInt(dinnerV) : null,
    rating:               ratingEl ? parseInt(ratingEl.value) : null,
    notes:                document.getElementById('f-notes').value.trim(),
  };

  if (editingId) {
    update(editingId, data);
    toast('保存しました', 'success');
  } else {
    add(data);
    toast('店舗を追加しました', 'success');
  }
  closeFormModal();
  render();
}

function deleteEditing() {
  if (!editingId) return;
  const r = byId(editingId);
  if (!confirm(`「${r.name}」を削除しますか？`)) return;
  remove(editingId);
  closeFormModal();
  toast('削除しました');
  render();
}

// ============================================================
// FILTER HANDLERS
// ============================================================
let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    filters.search = document.getElementById('search-input').value.trim();
    render();
  }, 200);
}

function onFilterChange() {
  filters.genre  = document.getElementById('genre-select').value;
  filters.budget = document.getElementById('budget-select').value;
  render();
}

function setVisited(v) {
  filters.visited = v;
  document.querySelectorAll('.visited-toggle button').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  render();
}

function toggleScene(s) {
  const i = filters.scenes.indexOf(s);
  i === -1 ? filters.scenes.push(s) : filters.scenes.splice(i, 1);
  paintScenePills();
  render();
}

function paintScenePills() {
  document.getElementById('scene-pills').innerHTML =
    '<span style="font-size:12px;color:var(--text-muted);align-self:center;white-space:nowrap">シーン:</span>' +
    SCENES.map(s => `<button class="scene-pill${filters.scenes.includes(s) ? ' active' : ''}" onclick="toggleScene('${s}')">${s}</button>`).join('');
}

function clearFilters() {
  filters = { search: '', genre: '', scenes: [], budget: '', visited: 'all' };
  document.getElementById('search-input').value = '';
  document.getElementById('genre-select').value = '';
  document.getElementById('budget-select').value = '';
  document.querySelectorAll('.visited-toggle button').forEach(b => b.classList.toggle('active', b.dataset.v === 'all'));
  paintScenePills();
  render();
}

// ============================================================
// DATA MENU
// ============================================================
function toggleMenu() {
  document.getElementById('data-menu').classList.toggle('hidden');
}

function exportData() {
  document.getElementById('data-menu').classList.add('hidden');
  const blob = new Blob([JSON.stringify(restaurants, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `restaurants_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${restaurants.length}件をエクスポートしました`, 'success');
}

function importData(ev) {
  document.getElementById('data-menu').classList.add('hidden');
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      if (!confirm(`${data.length}件のデータをインポートします。現在のデータは置き換わります。よろしいですか？`)) return;
      restaurants = data;
      persist();
      render();
      toast(`${data.length}件インポートしました`, 'success');
    } catch { toast('インポート失敗：JSONファイルを確認してください', 'error'); }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

function clearAllData() {
  document.getElementById('data-menu').classList.add('hidden');
  if (!confirm('全データを削除します。この操作は取り消せません。')) return;
  restaurants = [];
  persist();
  render();
  toast('全データを削除しました');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast${type ? ' ' + type : ''}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, 2600);
}

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function safeUrl(url) {
  if (!url) return '';
  return /^https?:\/\//i.test(url) ? esc(url) : '';
}

// ============================================================
// GLOBAL EVENTS
// ============================================================
document.addEventListener('click', e => {
  if (!e.target.closest('#btn-menu') && !e.target.closest('#data-menu'))
    document.getElementById('data-menu').classList.add('hidden');
  if (e.target === document.getElementById('modal-form'))   closeFormModal();
  if (e.target === document.getElementById('modal-detail')) closeDetailModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeFormModal();
    closeDetailModal();
    document.getElementById('data-menu').classList.add('hidden');
  }
});

// ============================================================
// INIT
// ============================================================
load();
paintScenePills();
render();
</script>
</body>
</html>
